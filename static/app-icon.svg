<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2433"/>
      <stop offset="1" stop-color="#0d1019"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Lens / mark gradient: brand blue with a brighter top highlight -->
    <linearGradient id="lens" x1="0.2" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#a8c7ff"/>
      <stop offset="0.55" stop-color="#7aa6ff"/>
      <stop offset="1" stop-color="#4a78d8"/>
    </linearGradient>

    <!-- Comet-tail gradient: bright accent fading to transparent -->
    <linearGradient id="tail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8c7ff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#7aa6ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7aa6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App icon square -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#sheen)"/>

  <!-- Comet streak coming off the upper-right of the lens.
       Drawn as a soft tapered shape pointing toward the corner. -->
  <path
    d="M 580 410
       L 870 170
       Q 900 150 880 195
       L 660 480
       Z"
    fill="url(#tail)"
  />

  <!-- Magnifying glass mark (tilted: lens upper-left, handle lower-right) -->
  <g>
    <!-- Lens body -->
    <circle cx="445" cy="445" r="205" fill="url(#lens)"/>

    <!-- Inner dark "pupil" — gives it the stylized eye-of-the-search feel -->
    <circle cx="445" cy="445" r="118" fill="#101421"/>

    <!-- Soft glossy highlight on the lens rim, top-left -->
    <path
      d="M 305 380
         Q 360 290 460 270"
      fill="none"
      stroke="#ffffff"
      stroke-opacity="0.45"
      stroke-width="22"
      stroke-linecap="round"
    />

    <!-- Tiny specular dot inside the pupil -->
    <circle cx="395" cy="395" r="22" fill="#a8c7ff" fill-opacity="0.85"/>

    <!-- Handle: thick rounded line going to lower-right -->
    <line
      x1="600" y1="600"
      x2="795" y2="795"
      stroke="url(#lens)"
      stroke-width="92"
      stroke-linecap="round"
    />
  </g>
</svg>
