<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>LibreSearch</title>
		<link rel="stylesheet" href="popup.css" />
		<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
		<script src="../theme-init.js"></script>
	</head>
	<body class="p-5">
		<!-- Logo -->
		<div class="mb-5 flex items-center gap-3">
			<img src="../logo-128.png" alt="" width="36" height="36" class="rounded-lg" />
			<div class="leading-tight">
				<p class="text-sm font-semibold tracking-tight text-text">LibreSearch</p>
				<p class="text-[11px] text-muted">Private by design</p>
			</div>
			<a href="https://libresearch.ca" target="_blank" class="ml-auto text-muted transition-colors hover:text-text">
					Visit website
				<i class="fa-solid fa-arrow-up-right-from-square"></i>
			</a>
		</div>

		<!-- Search -->
		<form id="search-form" autocomplete="off" class="group">
			<label
				class="flex items-center gap-2.5 rounded-xl border border-border bg-surface px-3.5 py-2.5 transition-colors focus-within:border-accent"
			>
			<i class="fa-solid fa-magnifying-glass"></i>
				<input
					id="search-input"
					type="search"
					name="q"
					autocomplete="off"
					autocapitalize="off"
					autocorrect="off"
					spellcheck="false"
					placeholder="Search the web privately"
					autofocus
					class="min-w-0 flex-1 bg-transparent text-[13.5px] text-text outline-none placeholder:text-muted"
				/>
			</label>
		</form>

		<!-- Tab selector -->
		<nav class="mt-3 flex rounded-xl bg-surface p-1" role="tablist" aria-label="Search categories">
			<button
				class="tab is-active flex-1 rounded-lg px-2 py-1.5 text-xs font-medium text-muted transition-colors"
				data-tab=""
				role="tab"
				aria-selected="true"
			>
				Web
			</button>
			<button
				class="tab flex-1 rounded-lg px-2 py-1.5 text-xs font-medium text-muted transition-colors"
				data-tab="images"
				role="tab"
				aria-selected="false"
			>
				Images
			</button>
			<button
				class="tab flex-1 rounded-lg px-2 py-1.5 text-xs font-medium text-muted transition-colors"
				data-tab="videos"
				role="tab"
				aria-selected="false"
			>
				Videos
			</button>
			<button
				class="tab flex-1 rounded-lg px-2 py-1.5 text-xs font-medium text-muted transition-colors"
				data-tab="news"
				role="tab"
				aria-selected="false"
			>
				News
			</button>
		</nav>

		<!-- Footer -->
		<footer class="mt-5 flex items-center justify-between border-t border-border pt-3">
			<span class="inline-flex items-center gap-1.5 text-[11px] text-muted">
				<i class="fa-solid fa-shield"></i>
				No tracking
			</span>
			<button
				type="button"
				id="open-settings"
				class="cursor-pointer text-[11px] text-muted transition-colors hover:text-text"
			>
				<i class="fa-solid fa-gear"></i> Settings
			</button>
		</footer>

		<script type="module" src="popup.js"></script>
	</body>
</html>
